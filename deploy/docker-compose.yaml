# Local development stack: the full Grafana LGTM stack (Mimir/Loki/Tempo/Grafana)
# plus the collector, wired with direct OTLP export.
#
#   GW2_API_KEY=<key> docker compose -f deploy/docker-compose.yaml up --build
#
# Grafana:  http://localhost:3000  (anonymous admin)
# OTLP in:  http://otel-lgtm:4318  (from inside the compose network)
#
# The prod path (app -> Alloy -> Grafana Cloud) is a separate compose profile;
# the collector itself is unchanged — only OTEL_EXPORTER_OTLP_ENDPOINT differs.
services:
  otel-lgtm:
    image: grafana/otel-lgtm:latest
    container_name: gw2-otel-lgtm
    # Host ports use the 14xxx range to avoid colliding with a local Alloy
    # (which commonly binds 4317/4318). The in-compose collector still reaches
    # this container at otel-lgtm:4318 over the internal network.
    ports:
      - "3000:3000"   # Grafana UI
      - "14317:4317"  # OTLP gRPC  (host 14317 -> container 4317)
      - "14318:4318"  # OTLP HTTP  (host 14318 -> container 4318)
    volumes:
      - lgtm-data:/data
      # As-code dashboard: provider config + dashboard JSON, auto-loaded on start.
      - ./grafana/provisioning/dashboards/gw2.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/gw2.yaml:ro
      - ./dashboards:/var/lib/grafana/dashboards/gw2:ro

  collector:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: gw2-collector
    depends_on:
      - otel-lgtm
    environment:
      GW2_API_KEY: ${GW2_API_KEY:?set GW2_API_KEY in your environment or .env}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-lgtm:4318
      GW2_LOG_LEVEL: ${GW2_LOG_LEVEL:-info}
      # Faster intervals for a snappy dev loop; raise toward 5m for real use.
      GW2_INTERVAL_ACCOUNT: ${GW2_INTERVAL_ACCOUNT:-60s}
      GW2_INTERVAL_WALLET: ${GW2_INTERVAL_WALLET:-60s}
      GW2_INTERVAL_CHARACTERS: ${GW2_INTERVAL_CHARACTERS:-60s}
      GW2_INTERVAL_COMMERCE: ${GW2_INTERVAL_COMMERCE:-60s}
      GW2_INTERVAL_PROGRESSION: ${GW2_INTERVAL_PROGRESSION:-60s}
      GW2_INTERVAL_STORAGE: ${GW2_INTERVAL_STORAGE:-60s}
      GW2_INTERVAL_UNLOCKS: ${GW2_INTERVAL_UNLOCKS:-120s}
      GW2_INTERVAL_GUILD: ${GW2_INTERVAL_GUILD:-60s}
      GW2_INTERVAL_PVP: ${GW2_INTERVAL_PVP:-60s}
      GW2_INTERVAL_TRANSACTIONS: ${GW2_INTERVAL_TRANSACTIONS:-60s}
      GW2_INTERVAL_WIZARDSVAULT: ${GW2_INTERVAL_WIZARDSVAULT:-120s}
      GW2_INTERVAL_STORY: ${GW2_INTERVAL_STORY:-180s}
      GW2_INTERVAL_VALUE: ${GW2_INTERVAL_VALUE:-180s}
      GW2_EXPORT_INTERVAL: ${GW2_EXPORT_INTERVAL:-15s}
      # Demo watchlist: Mithril Ingot, Glob of Ectoplasm, Superior Rune of the Scholar.
      GW2_TRACK_ITEMS: ${GW2_TRACK_ITEMS:-19684,19721,24836}
      GW2_STATE_PATH: /data/state.db
    volumes:
      - gw2-state:/data

volumes:
  lgtm-data:
  gw2-state:
